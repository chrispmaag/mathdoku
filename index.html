<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathdoku</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Mathdoku</h1>

    <div id="difficulty-picker">
      <button class="diff-btn active" data-size="3">
        <span class="diff-label">Easy</span>
        <span class="diff-sub">3 × 3 · numbers 1–3</span>
      </button>
      <button class="diff-btn" data-size="4">
        <span class="diff-label">Medium</span>
        <span class="diff-sub">4 × 4 · numbers 1–4</span>
      </button>
      <button class="diff-btn" data-size="5">
        <span class="diff-label">Hard</span>
        <span class="diff-sub">5 × 5 · numbers 1–5</span>
      </button>
    </div>

    <p id="subtitle" class="subtitle">Fill in 1–3 once per row and column. Satisfy the cage hints.</p>
    <div id="board"></div>
    <div id="message" class="hidden">
      <span>Congratulations! Puzzle solved!</span>
    </div>
    <button id="new-puzzle">New Puzzle</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
